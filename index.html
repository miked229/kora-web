<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KORA — Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #000000;
      --gold: #C9960C;
      --gold-light: #E8C96A;
      --gold-dim: rgba(201,150,12,0.15);
      --cream: #F0E6C8;
      --cream-dim: #7a7060;
      --serif: 'Cormorant Garamond', Georgia, serif;
      --sans: 'Inter', system-ui, sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--black);
      color: var(--cream);
      font-family: var(--sans);
      overflow: hidden;
    }

    /* Ambient background */
    .bg {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 60% at 50% 55%, rgba(201,150,12,0.05) 0%, transparent 65%),
        radial-gradient(ellipse 40% 30% at 50% 80%, rgba(201,150,12,0.03) 0%, transparent 60%),
        #000000;
      z-index: 0;
    }

    /* Animated particles */
    .particles {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }
    .particle {
      position: absolute;
      width: 1px;
      height: 1px;
      background: var(--gold);
      border-radius: 50%;
      opacity: 0;
      animation: float linear infinite;
    }
    @keyframes float {
      0% { transform: translateY(100vh) translateX(0); opacity: 0; }
      10% { opacity: 0.6; }
      90% { opacity: 0.2; }
      100% { transform: translateY(-10vh) translateX(var(--drift)); opacity: 0; }
    }

    /* Main layout */
    .page {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      text-align: center;
    }

    /* Top line */
    .top-line {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(201,150,12,0.4), transparent);
    }

    /* Logo */
    .logo-wrap {
      width: min(420px, 80vw);
      margin: 0 auto 56px;
      animation: fadeUp 1.2s ease forwards;
      opacity: 0;
    }
    .logo-wrap img {
      width: 100%;
      height: auto;
      display: block;
      filter: drop-shadow(0 0 50px rgba(201,150,12,0.3)) drop-shadow(0 0 20px rgba(201,150,12,0.15));
    }

    /* Coming Soon badge */
    .badge {
      display: inline-block;
      font-family: var(--sans);
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--gold);
      border: 1px solid rgba(201,150,12,0.25);
      padding: 10px 28px;
      margin-bottom: 48px;
      animation: fadeUp 1.2s ease 0.2s forwards;
      opacity: 0;
    }

    /* Headline */
    .headline {
      font-family: var(--serif);
      font-size: clamp(32px, 5vw, 58px);
      font-weight: 300;
      color: var(--cream);
      line-height: 1.15;
      margin-bottom: 24px;
      animation: fadeUp 1.2s ease 0.35s forwards;
      opacity: 0;
    }

    /* Tagline */
    .tagline {
      font-family: var(--serif);
      font-size: clamp(16px, 2.5vw, 22px);
      font-weight: 300;
      font-style: italic;
      color: var(--cream-dim);
      margin-bottom: 64px;
      animation: fadeUp 1.2s ease 0.5s forwards;
      opacity: 0;
    }

    /* Divider */
    .divider {
      width: 1px;
      height: 48px;
      background: linear-gradient(to bottom, var(--gold), transparent);
      margin: 0 auto 48px;
      animation: fadeIn 1.2s ease 0.6s forwards;
      opacity: 0;
    }

    /* Notify form */
    .notify-wrap {
      width: min(480px, 90vw);
      animation: fadeUp 1.2s ease 0.7s forwards;
      opacity: 0;
    }
    .notify-label {
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--cream-dim);
      margin-bottom: 20px;
      display: block;
    }
    .notify-form {
      display: flex;
      gap: 0;
      border: 1px solid rgba(201,150,12,0.2);
      transition: border-color 0.3s ease;
    }
    .notify-form:focus-within { border-color: rgba(201,150,12,0.5); }
    .notify-form input {
      flex: 1;
      background: rgba(201,150,12,0.03);
      border: none;
      color: var(--cream);
      padding: 16px 20px;
      font-family: var(--sans);
      font-size: 14px;
      font-weight: 300;
      outline: none;
    }
    .notify-form input::placeholder { color: rgba(240,230,200,0.2); }
    .notify-form button {
      background: var(--gold);
      color: var(--black);
      border: none;
      padding: 16px 28px;
      font-family: var(--sans);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.3s ease;
      white-space: nowrap;
    }
    .notify-form button:hover { background: var(--gold-light); }

    .notify-thanks {
      display: none;
      font-family: var(--serif);
      font-size: 20px;
      font-style: italic;
      color: var(--gold-light);
      padding: 20px 0;
    }

    /* Location */
    .location {
      margin-top: 56px;
      font-size: 11px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--cream-dim);
      opacity: 0.5;
      animation: fadeIn 1.5s ease 1s forwards;
      opacity: 0;
    }

    /* Social */
    .social {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 32px;
      z-index: 10;
      animation: fadeIn 1.5s ease 1.2s forwards;
      opacity: 0;
    }
    .social a {
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--cream-dim);
      text-decoration: none;
      opacity: 0.5;
      transition: opacity 0.3s ease, color 0.3s ease;
    }
    .social a:hover { opacity: 1; color: var(--gold); }

    /* Bottom line */
    .bottom-line {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(201,150,12,0.2), transparent);
    }

    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* Mobile */
    @media (max-width: 480px) {
      .notify-form { flex-direction: column; }
      .notify-form button { width: 100%; }
      html, body { overflow: auto; }
    }
  </style>
</head>
<body>

  <div class="bg"></div>

  <!-- Particles -->
  <div class="particles" id="particles"></div>

  <div class="top-line"></div>
  <div class="bottom-line"></div>

  <div class="page">

    <!-- Logo -->
    <div class="logo-wrap">
      <img src="images/kora-logo-official.webp" alt="KORA" />
    </div>

    <!-- Badge -->
    <div class="badge">Coming Soon</div>

    <!-- Headline -->
    <h1 class="headline">
      Where rhythm meets the ocean.
    </h1>

    <!-- Tagline -->
    <p class="tagline">Not a party. A feeling.</p>

    <div class="divider"></div>

    <!-- Notify -->
    <div class="notify-wrap">
      <span class="notify-label">Be the first to know</span>
      <form class="notify-form" id="notifyForm" onsubmit="handleSubmit(event)">
        <input type="email" placeholder="your@email.com" required />
        <button type="submit">Notify me</button>
      </form>
      <p class="notify-thanks" id="thanks">
        You're in. See you at sunset. ✦
      </p>
    </div>

    <!-- Location -->
    <p class="location">Cozumel · Quintana Roo · México</p>

  </div>

  <!-- Social -->
  <div class="social">
    <a href="https://instagram.com/koramx" target="_blank">Instagram</a>
    <a href="mailto:kora@koramx.com">Contact</a>
    <a href="https://koramx.com">koramx.com</a>
  </div>

  <script>
    // Particles
    const container = document.getElementById('particles');
    for (let i = 0; i < 40; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + 'vw';
      p.style.width = p.style.height = (Math.random() * 2 + 1) + 'px';
      p.style.setProperty('--drift', (Math.random() - 0.5) * 200 + 'px');
      p.style.animationDuration = (Math.random() * 15 + 10) + 's';
      p.style.animationDelay = (Math.random() * 15) + 's';
      container.appendChild(p);
    }

    // Form
    function handleSubmit(e) {
      e.preventDefault();
      document.getElementById('notifyForm').style.display = 'none';
      document.getElementById('thanks').style.display = 'block';
    }
  </script>

</body>
</html>
